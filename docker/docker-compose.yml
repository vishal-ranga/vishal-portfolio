# Production stack: Next.js app (behind Nginx as a reverse proxy).
#
# Usage (from the repository root):
#   docker compose -f docker/docker-compose.yml up --build -d
#
# The app itself is never exposed directly in production — only Nginx
# publishes a host port, matching how this would sit behind a real
# load balancer / ingress in a company environment.

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: portfolio:latest
    container_name: portfolio-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - portfolio-net

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - portfolio-net
  jenkins:
    image: custom-jenkins:latest
    container_name: jenkins
    restart: unless-stopped

    ports:
      - "8081:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge
    
volumes:
  jenkins_home: