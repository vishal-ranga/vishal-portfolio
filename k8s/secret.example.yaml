# Template only — copy to `secret.yaml`, fill in real values, and NEVER
# commit the filled-in version. `secret.yaml` is already covered by the
# repository .gitignore pattern for k8s secrets (see project .gitignore).
#
# Apply with:
#   kubectl apply -f k8s/secret.yaml
#
# In a real environment, prefer a secrets manager integration (e.g.
# External Secrets Operator, Sealed Secrets, or your cloud provider's
# native secret store) over plain Kubernetes Secrets, which are only
# base64-encoded, not encrypted, at rest by default on most clusters.

apiVersion: v1
kind: Secret
metadata:
  name: portfolio-secrets
  namespace: portfolio
type: Opaque
stringData:
  # e.g. SMTP credentials for the /api/contact route, if wired to a real
  # mail provider instead of the current placeholder handler.
  SMTP_HOST: "smtp.example.com"
  SMTP_USER: "REPLACE_ME"
  SMTP_PASSWORD: "REPLACE_ME"
