---
- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Ensure Nginx is enabled and running
  systemd:
    name: nginx
    enabled: true
    state: started

- name: Allow Nginx through the firewall (if ufw is active)
  ufw:
    rule: allow
    name: "Nginx Full"
  ignore_errors: true
